<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="GoalChain - Decentralized World Cup Prediction Markets powered by TxLINE" />
    <title>GoalChain - Prediction Markets</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      #preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #0b1121; /* matches deep space bg */
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }
      .preloader-img {
        width: 120px;
        height: 120px;
        animation: pulse 1.5s infinite ease-in-out;
      }
      @keyframes pulse {
        0% { transform: scale(0.9); opacity: 0.7; }
        50% { transform: scale(1.1); opacity: 1; }
        100% { transform: scale(0.9); opacity: 0.7; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="preloader">
        <img src="/favicon.png" alt="Loading..." class="preloader-img" />
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
